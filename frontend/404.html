<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting</title>
    <script>
      (function () {
        const basePath = "%BASE_URL%";
        const normalizedBasePath =
          !basePath || basePath === "/"
            ? "/"
            : "/" + basePath.replace(/^\/+|\/+$/g, "") + "/";
        const basePathWithoutTrailingSlash =
          normalizedBasePath === "/" ? "/" : normalizedBasePath.slice(0, -1);
        const currentPath = window.location.pathname;
        const routePath =
          currentPath === basePathWithoutTrailingSlash
            ? "/"
            : currentPath.startsWith(normalizedBasePath)
              ? currentPath.slice(normalizedBasePath.length - 1)
              : currentPath;
        const searchParams = new URLSearchParams();

        searchParams.set("__gh_pages_fallback", "1");
        searchParams.set("p", routePath || "/");

        if (window.location.search.length > 1) {
          searchParams.set("q", window.location.search.slice(1));
        }

        if (window.location.hash.length > 1) {
          searchParams.set("h", window.location.hash.slice(1));
        }

        window.location.replace(
          window.location.origin +
            normalizedBasePath +
            "?" +
            searchParams.toString(),
        );
      })();
    </script>
  </head>
  <body></body>
</html>
