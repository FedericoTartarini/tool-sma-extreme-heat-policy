name: CI

on:
  pull_request:
    branches:
      - main
      - development
  push:
    branches:
      - main
      - development

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_MAPBOX_ACCESS_TOKEN: ci_dummy_mapbox_token
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.5.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm run lint:ci

      - name: Run frontend tests
        run: pnpm run test:ci

      - name: Build frontend
        run: pnpm run build

  backend-ci:
    name: backend-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      UV_CACHE_DIR: /tmp/uv-cache
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Restore uv cache
        id: restore-uv-cache
        uses: actions/cache/restore@v5.0.5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('backend/uv.lock', 'backend/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install uv
        run: python -m pip install --upgrade pip uv==0.11.19

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Save uv cache
        if: steps.restore-uv-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5.0.5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('backend/uv.lock', 'backend/pyproject.toml') }}

      - name: Lint backend
        run: uv run ruff check .

      - name: Run backend tests
        run: uv run pytest

      - name: Check backend startup
        run: |
          uv run uvicorn sma_extreme_heat_backend.main:app --host 127.0.0.1 --port 8000 > /tmp/sma-backend.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for _ in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/health/ready; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/sma-backend.log
          exit 1
